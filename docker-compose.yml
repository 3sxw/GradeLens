services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64  # runs under Rosetta on Apple Silicon
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "GradeLens!Dev2026"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'GradeLens!Dev2026' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

volumes:
  sqldata:
